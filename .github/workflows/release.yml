name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          if-no-files-found: error
          path: |
            release/design-order-manager-setup-*.exe
            release/*.blockmap
            release/latest.yml

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $notes = @()
          if (Test-Path "public/update-manifest.json") {
            try {
              $manifest = Get-Content "public/update-manifest.json" -Raw -Encoding UTF8 | ConvertFrom-Json
              if ($manifest.notes) {
                $notes = @($manifest.notes | Where-Object { $_ -is [string] -and $_.Trim() })
              }
            } catch {
              $notes = @()
            }
          }

          "# 更新内容" | Set-Content "release-notes.md" -Encoding UTF8
          if ($notes.Count -eq 0) {
            "- 包含最新功能、界面调整和问题修复" | Add-Content "release-notes.md" -Encoding UTF8
          } else {
            foreach ($note in $notes) {
              "- $note" | Add-Content "release-notes.md" -Encoding UTF8
            }
          }

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 设计客户管理系统 ${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/design-order-manager-setup-*.exe
            release/*.blockmap
            release/latest.yml
